name: Build Pi image

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write        # attach the image to a Release on tag

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Public SSH key(s) for the appliance's key-only 'scanner' user.
      # Set repo Actions variable SSH_AUTHORIZED_KEYS (Settings > Secrets and
      # variables > Actions > Variables). Without it, SSH login is impossible.
      - name: Stage SSH authorized_keys
        run: |
          if [ -n "${{ vars.SSH_AUTHORIZED_KEYS }}" ]; then
            printf '%s\n' "${{ vars.SSH_AUTHORIZED_KEYS }}" > deploy/authorized_keys
            echo "Staged $(wc -l < deploy/authorized_keys) key line(s)."
          else
            echo "::warning::SSH_AUTHORIZED_KEYS not set — image will have no SSH access."
          fi

      - name: Build appliance image
        id: build
        uses: pguyot/arm-runner-action@v2
        with:
          base_image: raspios_lite_arm64:latest
          image_additional_mb: 1024
          copy_repository_path: /opt/slidescanner
          commands: |
            bash /opt/slidescanner/deploy/provision-image.sh

      - name: Compress image
        run: |
          IMG="${{ steps.build.outputs.image }}"
          xz -T0 -6 "$IMG"
          echo "ASSET=${IMG}.xz" >> "$GITHUB_ENV"
          ls -lh "${IMG}.xz"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: slidescanner-image
          path: ${{ env.ASSET }}
          if-no-files-found: error

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
